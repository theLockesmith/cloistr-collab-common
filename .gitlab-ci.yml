stages:
  - build
  - publish

variables:
  NODE_VERSION: "22"

# Build and type-check
build:
  stage: build
  image: node:${NODE_VERSION}-alpine
  script:
    - npm ci
    - npm run build
  artifacts:
    paths:
      - dist/
    expire_in: 1 hour
  cache:
    key: ${CI_COMMIT_REF_SLUG}
    paths:
      - node_modules/

# Publish to GitLab npm registry
publish:
  stage: publish
  image: node:${NODE_VERSION}-alpine
  dependencies:
    - build
  script:
    - echo "@cloistr:registry=https://git.coldforge.xyz/api/v4/projects/${CI_PROJECT_ID}/packages/npm/" > .npmrc
    - echo "//git.coldforge.xyz/api/v4/projects/${CI_PROJECT_ID}/packages/npm/:_authToken=${CI_JOB_TOKEN}" >> .npmrc
    - npm publish
  only:
    - master
    - tags
